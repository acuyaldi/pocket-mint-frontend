name: Frontend CI

on:
  pull_request:
    branches:
      - dev
      - main

  push:
    branches:
      - dev
      - main

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Frontend Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Public, non-secret placeholders used only to prove the app can build.
      NEXT_PUBLIC_SUPABASE_URL: https://supabase.example.invalid
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_API_URL: https://api.example.invalid/api/v1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Production build
        run: npm run build

      - name: Reject legacy backend authentication
        shell: bash
        run: |
          set +e
          matches=$(git grep -n -I -i -E \
            'x-api-key|x-user-id|x-user-email|kunci_rahasia_pocket_mint_2026' \
            -- app components lib src proxy.ts 2>&1)
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "Legacy authentication artifacts found in runtime source:"
            echo "$matches"
            exit 1
          fi

          if [ "$status" -ne 1 ]; then
            echo "Runtime source scan failed:"
            echo "$matches"
            exit "$status"
          fi

          echo "Runtime source is free of legacy authentication headers."

      - name: Scan production bundle
        shell: bash
        run: |
          if [ ! -d .next/server ] || [ ! -d .next/static ]; then
            echo "Expected Next.js build output is missing."
            exit 1
          fi

          set +e
          matches=$(grep -RInaE --exclude='*.map' \
            'x-api-key|x-user-id|x-user-email|kunci_rahasia_pocket_mint_2026|localhost:5001|127\.0\.0\.1:5001' \
            .next/server .next/static 2>&1)
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "Forbidden runtime values found in production bundle:"
            echo "$matches"
            exit 1
          fi

          if [ "$status" -ne 1 ]; then
            echo "Production bundle scan failed:"
            echo "$matches"
            exit "$status"
          fi

          echo "Production bundle security scan passed."
